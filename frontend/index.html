<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechSolution | Gestão de Ativos & Chamados</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./src/css/styles.css" />
  </head>
  <body class="bg-app">
    <a class="skip-link" href="#app">Pular para o conteúdo</a>

    <header class="app-header border-bottom sticky-top">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid px-3">
          <a class="navbar-brand fw-semibold" href="#/dashboard">
            <span class="brand-mark">Tech</span>Solution
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMain"
            aria-controls="navMain"
            aria-expanded="false"
            aria-label="Alternar navegação"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="navLinks"></ul>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-outline-light btn-sm" id="btnApiMode" type="button"></button>
              <div class="vr text-white opacity-50 d-none d-lg-block"></div>
              <button class="btn btn-light btn-sm" id="btnLogout" type="button">Sair</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container-fluid px-3 py-3" id="app" tabindex="-1">
      <div id="toastRegion" class="toast-container position-fixed top-0 end-0 p-3"></div>
      <div id="view"></div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
